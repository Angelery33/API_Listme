spring.application.name=listme
server.port=8089
spring.datasource.url=${LISTME_DB_URL:jdbc:postgresql://localhost:5433/list_me}
spring.datasource.username=${LISTME_DB_USERNAME:admin}
spring.datasource.password=${LISTME_DB_PASSWORD:angelc45}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${LISTME_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Security Configuration (JWT)
# CRÍTICO: Sobreescribir LISTME_JWT_SECRET con un valor seguro en producción (mínimo 256 bits)
