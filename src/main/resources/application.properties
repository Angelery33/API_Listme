spring.application.name=listme
server.port=8089
spring.datasource.url=${LISTME_DB_URL}
spring.datasource.username=${LISTME_DB_USERNAME}
spring.datasource.password=${LISTME_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${LISTME_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Security Configuration (JWT)
# Requiere variable de entorno LISTME_JWT_SECRET (mínimo 256 bits, sin valor por defecto)
application.security.jwt.secret-key=${LISTME_JWT_SECRET}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=2592000000

# Bootstrap admin (solo se crea si ambas variables están definidas y no vacías)
listme.bootstrap.username=${LISTME_BOOTSTRAP_USERNAME:}
listme.bootstrap.password=${LISTME_BOOTSTRAP_PASSWORD:}

# CORS: orígenes permitidos separados por coma (sin wildcards en producción)
listme.cors.allowed-origins=${LISTME_CORS_ORIGINS:https://app.angelcantero.store,http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000}
