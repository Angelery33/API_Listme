spring.application.name=listme-test

# Use an in-memory DB for tests so `gradlew test` doesn't depend on a local Postgres.
spring.datasource.url=jdbc:h2:mem:listme;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Don't execute src/main/resources/data.sql during tests.
spring.sql.init.mode=never

